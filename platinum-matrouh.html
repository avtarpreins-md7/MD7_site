<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>MD7 Platinum Matrouh</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --sea-blue: #00AEEF;
    --sky-blue: #87CEEB;
    --sand: #F5DEB3;
    --white: #FFFFFF;
    --deep-sea: #0077BE;
    --whatsapp-green: #25D366;
  }
  
  body { 
    font-family: 'Cairo', sans-serif; 
    background: linear-gradient(135deg, var(--sky-blue) 0%, var(--sea-blue) 100%);
    color: var(--deep-sea); 
    padding: 20px; 
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  
  .box { 
    background: var(--white); 
    padding: 40px; 
    border-radius: 40px; 
    width: 100%;
    max-width: 500px;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
    border: 6px solid var(--sand);
  }
  
  h1 { color: var(--sea-blue); text-align: center; font-weight: 900; margin-bottom: 25px; }
  
  label { font-weight: 700; display: block; margin-top: 15px; color: var(--deep-sea); }
  
  select, input { 
    width: 100%; padding: 14px; margin-top: 8px; border-radius: 15px; 
    border: 2px solid var(--sky-blue); font-size: 16px;
    background-color: #fcfc;
  }
  
  button { 
    width: 100%; padding: 18px; margin-top: 20px; 
    background: var(--sea-blue); color: white; border: none; font-size: 20px; 
    font-weight: 900; border-radius: 15px; cursor: pointer; transition: 0.3s;
  }
  
  .wa-button { 
    background: var(--whatsapp-green); text-decoration: none; display: block;
    text-align: center; color: white; padding: 18px; border-radius: 15px;
    font-size: 20px; font-weight: 900; margin-top: 15px;
  }
  
  #result { 
    margin-top: 30px; padding: 25px; background: var(--sand); 
    border-radius: 20px; display: none; text-align: center; color: var(--deep-sea);
  }
  
  .contact-info { margin-top: 25px; text-align: center; font-weight: 700; font-size: 16px; }
  .back { display: block; text-align: center; margin-top: 20px; color: white; text-decoration: none; }
</style>
</head>
<body>

<div class="box">
  <h1>MD7 Platinum 5⭐</h1>
  
  <label>مستوى الإقامة:</label>
  <select id="package">
    <option value="3200">شقة بلاتينيوم (فطار)</option>
    <option value="3800">فندق بلاتينيوم (فطار)</option>
    <option value="4700">فندق+ بلاتينيوم (فطار + عشاء)</option>
  </select>

  <label>عدد الليالي:</label>
  <input type="number" id="nights" value="3">

  <label>عدد الكبار:</label>
  <input type="number" id="adults" value="2">

  <button onclick="calculate()">احسب تكلفة رحلتك 🏖️</button>

  <div id="result">
    <div style="font-size: 18px;">إجمالي التكلفة:</div>
    <div style="font-size: 30px; font-weight: 900; margin: 10px 0;" id="totalPrice">0 ج</div>
    <div style="font-size: 15px; font-weight: 700;">المقدم (50%) للحجز: <span id="deposit">0</span> ج</div>
    
    <button onclick="window.print()" style="background: var(--deep-sea);">اطبع الـ PDF 📄</button>
    
    <a href="https://wa.me/201033182019?text=عايز_احجز_رحلة_Matrouh360" class="wa-button">احجز واتساب الآن 🟢</a>
    
    <div class="contact-info">
      للتواصل: 201033182019<br>
      محمد رضوان - MD7 Group
    </div>
  </div>
  <a href="index.html" class="back">← رجوع للرئيسية</a>
</div>

<script>
function calculate() {
  const pkg = parseInt(document.getElementById('package').value);
  const nights = parseInt(document.getElementById('nights').value);
  const adults = parseInt(document.getElementById('adults').value);
  const total = pkg * nights * adults;
  
  document.getElementById('totalPrice').innerText = total.toLocaleString() + ' ج';
  document.getElementById('deposit').innerText = (total / 2).toLocaleString();
  document.getElementById('result').style.display = 'block';
}
</script>

</body>
</html>
