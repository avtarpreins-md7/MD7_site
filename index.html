<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MD7 GROUP | Imagine • Innovate • Inspire</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root { --gold: #D4AF37; --dark: #0A0A0A; --black2: #121212; --text: #EAEAEA; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: var(--dark); color: var(--text); overflow-x: hidden; }

    /* الهيرو */
   .hero { display: flex; min-height: 100vh; background: radial-gradient(circle at top, #1a1a1a 0%, var(--dark) 100%); }
   .hero-left { flex: 1; padding: 60px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; border-left: 1px solid var(--gold); }
   .logo { font-size: 6rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 20px rgba(212,175,55,0.4); }
   .logo-sub { letter-spacing: 8px; color: var(--gold); margin-bottom: 30px; }
   .hero-left h2 { font-size: 1.8rem; color: var(--gold); margin-bottom: 15px; }
   .hero-left p { font-size: 1.1rem; line-height: 1.8; max-width: 450px; margin-bottom: 30px; }
   .hero-right { flex: 1.2; background: url('An82FzGUs8T9rTyJZXeOtOTKJhTo0j5hV0qn8CgygryhJh8A-WgSmXeBXcIpFEZ46Jo1ArxAVFemUglQ6El3zIbH5DX5woBaKpsOF3_h-kbnETD8RZBxK_qS') center/cover no-repeat; }

    /* المؤسسات */
   .section { padding: 80px 5%; background: var(--black2); }
   .section-title { text-align: center; font-size: 2.5rem; color: var(--gold); margin-bottom: 50px; }
   .institutes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; }
   .institute-card {
        background: #1a1a1a; padding: 30px; border-radius: 15px; text-align: center;
        border: 1px solid #333; cursor: pointer; transition: 0.3s;
    }
   .institute-card:hover { border-color: var(--gold); transform: translateY(-8px); box-shadow: 0 0 25px rgba(212,175,55,0.2); }
   .institute-card.icon { font-size: 45px; color: var(--gold); margin-bottom: 15px; }
   .institute-card h3 { font-size: 1.4rem; margin-bottom: 10px; color: var(--gold); }

    /* مودال النموذج */
   .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; overflow-y: auto; }
   .modal-content { background: var(--black2); margin: 5% auto; padding: 40px; border-radius: 20px; width: 90%; max-width: 900px; border: 2px solid var(--gold); }
   .close { float: left; font-size: 30px; color: var(--gold); cursor: pointer; }
   .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
   .form-group input,.form-group textarea { width: 100%; padding: 12px; background: #222; border: 1px solid #444; border-radius: 8px; color: white; }
   .submit-btn { background: var(--gold); color: var(--dark); padding: 12px 30px; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; }

    /* عرض المشاريع */
   .projects-list { margin-top: 30px; }
   .project-item { background: #222; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-right: 3px solid var(--gold); }
</style>
</head>
<body>

<!-- الهيرو -->
<section class="hero">
    <div class="hero-left">
        <div class="logo">MD7</div>
        <div class="logo-sub">GROUP</div>
        <p>IMAGINE • INNOVATE • INSPIRE</p>
        <h2>شريك في أول مشروع...</h2>
        <h2>لبداية أسطورة عالمية</h2>
        <p>immersive.</p>
    </div>إدارة وتطوير لمستقبل أفضل 
    <div class="hero-right"></div>
</section>

<!-- 4 المؤسسات -->
<section class="section">
    <h2 class="section-title">مؤسسات مجموعة MD7</h2>
    <div class="institutes-grid">
        <div class="institute-card" onclick="openModal('الفكري')">
            <div class="icon"><i class="fa-solid fa-lightbulb"></i></div>
            <h3>الإبداع الفكري والتطوير</h3>
        </div>
        <div class="institute-card" onclick="openModal('الرقمي')">
            <div class="icon"><i class="fa-solid fa-satellite-dish"></i></div>
            <h3>تطوير القنوات والمنصات</h3>
        </div>
        <div class="institute-card" onclick="openModal('السياحة')">
            <div class="icon"><i class="fa-solid fa-umbrella-beach"></i></div>
            <h3>السياحة والترفيه</h3>
        </div>
        <div class="institute-card" onclick="openModal('الطاقة')">
            <div class="icon"><i class="fa-solid fa-leaf"></i></div>
            <h3>الطاقة والغذاء</h3>
        </div>
    </div>
</section>

<!-- المودال -->
<div id="consultModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h2 id="modalTitle" style="color: var(--gold);"></h2>

    <h3 style="margin-top: 20px;">1. نموذج طلب رأي استشاري</h3>
    <form id="consultForm">
        <div class="form-grid">
            <div class="form-group"><input type="text" placeholder="الاسم" required></div>
            <div class="form-group"><input type="email" placeholder="الايميل" required></div>
        </div>
        <div class="form-group"><textarea rows="4" placeholder="اشرح فكرتك أو طلبك الاستشاري"></textarea></div>
        <button type="submit" class="submit-btn">إرسال الطلب</button>
    </form>

    <h3 style="margin-top: 30px;">2. المشاريع المضافة</h3>
    <div id="projectsList" class="projects-list"></div>

    <audio id="bgMusic" loop></audio>
  </div>
</div>

<script>
    const musicTracks = {
        'الفكري': 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3', // هادي فكري
        'الرقمي': 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3', // تكنولوجي
        'السياحة': 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3', // مبهج
        'الطاقة': 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3' // طبيعي
    };

    const projects = {
        'الفكري': [{title: 'ملف تطوير كرة القدم 2030', link: 'vision-game.html'}],
        'الرقمي': [{title: 'قناة MD7 الذكية', link: 'vision-digital.html'}],
        'السياحة': [{title: 'برامج الرحلات الذكية', link: '#'}],
        'الطاقة': [{title: 'ملف MD6 الطاقة المتجددة', link: 'md6-energy.html'}]
    };

    function openModal(type) {
        document.getElementById('modalTitle').innerText = `مؤسسة ${type}`;
        document.getElementById('consultModal').style.display = 'block';

        // عرض المشاريع
        let list = document.getElementById('projectsList');
        list.innerHTML = '';
        projects[type].forEach(p => {
            list.innerHTML += `<div class="project-item"><a href="${p.link}" style="color:var(--gold); text-decoration:none;">${p.title}</a></div>`;
        });

        // تشغيل الموسيقى
        let music = document.getElementById('bgMusic');
        music.src = musicTracks[type];
        music.play();
    }
    function closeModal() {
        document.getElementById('consultModal').style.display = 'none';
        document.getElementById('bgMusic').pause();
    }
</script>

</body>
</html>
